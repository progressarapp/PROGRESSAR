<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROGRESSAR — Progressão de Carga Inteligente</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PROGRESSAR">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <meta name="theme-color" content="#FF5C00">
  <!-- Favicon & iOS icon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PROGRESSAR">
  <meta name="description" content="App de progressão de carga baseado no Método Paulo Muzy. Sem planilha, sem achismo.">
  <meta property="og:title" content="PROGRESSAR — Progressão Inteligente">
  <meta property="og:description" content="Coach virtual, cardio inteligente, modo iniciante e progressão automática.">
  <meta property="og:type" content="website">

<style>
  :root {
    --orange: #FF5C00;
    --orange-dim: #FF5C0022;
    --orange-mid: #FF5C0055;
    --dark: #0A0A0A;
    --darker: #060606;
    --card: #111111;
    --card2: #161616;
    --border: #222222;
    --border2: #2A2A2A;
    --text: #F0F0F0;
    --muted: #666666;
    --muted2: #888888;
    --green: #00E676;
    --green-dim: #00E67622;
    --blue: #448AFF;
    --blue-dim: #448AFF22;
    --red: #FF5252;
    --red-dim: #FF525222;
    --yellow: #FFD740;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--darker);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  .app { display: flex; height: 100vh; }

  .sidebar {
    width: 68px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    gap: 8px;
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 200;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--orange);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    letter-spacing: 4px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .nav-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    position: relative;
  }

  .nav-btn:hover { background: var(--border); color: var(--text); }
  .nav-btn.active {
    background: var(--orange-dim);
    border-color: var(--orange-mid);
    color: var(--orange);
  }

  .nav-btn .tooltip {
    position: absolute;
    left: 54px;
    background: var(--card2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .nav-btn:hover .tooltip { opacity: 1; }

  .main {
    margin-left: 68px;
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .view { display: none; animation: fadeIn 0.3s ease; }
  .view.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .page-header {
    padding: 32px 32px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--text);
    letter-spacing: 2px;
    line-height: 1;
  }

  .page-subtitle { font-size: 14px; color: var(--muted2); margin-top: 4px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .card-sm { padding: 16px; border-radius: 12px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--orange);
    color: white;
  }
  .btn-primary:hover { background: #FF7020; transform: translateY(-1px); box-shadow: 0 4px 20px var(--orange-mid); }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted2);
  }
  .btn-ghost:hover { background: var(--card2); color: var(--text); }

  .btn-success {
    background: var(--green-dim);
    border: 1px solid var(--green);
    color: var(--green);
  }
  .btn-success:hover { background: var(--green); color: var(--dark); }

  .btn-full { width: 100%; justify-content: center; }
  .btn-lg { padding: 14px 28px; font-size: 16px; border-radius: 14px; }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tag-orange { background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange-mid); }
  .tag-green { background: var(--green-dim); color: var(--green); }
  .tag-blue { background: var(--blue-dim); color: var(--blue); }
  .tag-red { background: var(--red-dim); color: var(--red); }

  input, select {
    background: var(--card2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus { border-color: var(--orange); }
  input[type=number] { font-family: 'DM Mono', monospace; }

  select option { background: var(--card2); }

  label { font-size: 12px; color: var(--muted2); font-weight: 500; margin-bottom: 6px; display: block; }

  .sep { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  .stat-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: var(--orange);
    line-height: 1;
  }

  .stat-label { font-size: 12px; color: var(--muted2); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  .progress-bar {
    height: 6px;
    background: var(--border2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--orange);
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  .progress-fill.green { background: var(--green); }

  .exercise-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .exercise-row:hover { border-color: var(--orange-mid); background: #1A1A1A; }
  .exercise-row.selected { border-color: var(--orange); background: var(--orange-dim); }

  .exercise-icon {
    width: 40px; height: 40px;
    background: var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .exercise-name { font-weight: 600; font-size: 14px; }
  .exercise-meta { font-size: 12px; color: var(--muted2); margin-top: 2px; }

  .set-row {
    display: grid;
    grid-template-columns: 36px 1fr 1fr 40px;
    gap: 8px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .set-number {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    background: var(--border);
    border-radius: 6px;
    padding: 4px 0;
  }

  .set-number.done { background: var(--green-dim); color: var(--green); }

  .chart-container {
    position: relative;
    width: 100%;
    height: 160px;
  }

  canvas { width: 100% !important; }

  .notification {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 14px 18px;
    max-width: 320px;
    z-index: 9998;
    transform: translateX(400px);
    transition: transform 0.3s ease;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .notification.show { transform: translateX(0); }
  .notification-icon { font-size: 22px; }
  .notification-title { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
  .notification-msg { font-size: 13px; color: var(--muted2); }
  .notification.success { border-color: var(--green); }
  .notification.warning { border-color: var(--yellow); }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(4px);
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px 14px;
    box-sizing: border-box;
  }
  .modal-overlay.open { display: flex; }

  /* Bottom sheet — apenas coach, tecnica e rest */
  #coach-modal.open,
  #tecnica-modal.open,
  #rest-modal.open {
    align-items: flex-end;
    padding: 0;
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 24px 22px;
    width: 100%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
    margin: 0 auto;
    box-sizing: border-box;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; margin-bottom: 20px; letter-spacing: 1px; }

  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    color: var(--orange);
    text-align: center;
    letter-spacing: 4px;
    line-height: 1;
  }

  .timer-label { text-align: center; font-size: 12px; color: var(--muted2); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }

  .workout-header {
    background: linear-gradient(135deg, #1A0800 0%, #0F0F0F 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .progress-arrow {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    font-weight: 700;
  }

  .progress-arrow.up { color: var(--green); }
  .progress-arrow.same { color: var(--yellow); }
  .progress-arrow.down { color: var(--red); }

  .suggestion-box {
    background: linear-gradient(135deg, #1A0D00 0%, #111111 100%);
    border: 1px solid var(--orange-mid);
    border-radius: 16px;
    padding: 20px;
  }

  .suggestion-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--orange);
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  .section { padding: 24px 32px; }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--muted2);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .onboarding-bg {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 50%, #1A0D00 0%, var(--darker) 60%);
    padding: 32px;
  }

  .onboarding-card {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 40px;
    max-width: 440px;
    width: 100%;
    text-align: center;
  }

  .onboarding-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    color: var(--orange);
    letter-spacing: 6px;
    margin-bottom: 8px;
  }

  .step { display: none; }
  .step.active { display: block; }

  .step-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 99px;
    background: var(--border2);
    transition: all 0.3s;
  }
  .dot.active { background: var(--orange); width: 20px; }

  .muscle-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .muscle-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-size: 12px;
    color: var(--muted2);
  }

  .muscle-btn:hover, .muscle-btn.active {
    background: var(--orange-dim);
    border-color: var(--orange);
    color: var(--orange);
  }

  .muscle-btn .emoji { font-size: 20px; display: block; margin-bottom: 4px; }

  .ring-chart {
    position: relative;
    width: 80px; height: 80px;
    flex-shrink: 0;
  }

  .ring-chart svg { transform: rotate(-90deg); }
  .ring-chart .ring-value {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--orange);
  }

  @media (max-width: 768px) {
    .sidebar {
      width: 100% !important;
      height: 60px !important;
      top: auto !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      flex-direction: row !important;
      justify-content: space-around !important;
      align-items: center !important;
      padding: 0 8px !important;
      border-right: none !important;
      border-top: 1px solid var(--border) !important;
      gap: 0 !important;
      z-index: 1000 !important;
    }

    .sidebar .logo { display: none !important; }

    .main {
      margin-left: 0 !important;
      margin-bottom: 60px !important;
      width: 100% !important;
    }

    .nav-btn .tooltip { display: none !important; }

    .nav-btn {
      width: 48px !important;
      height: 48px !important;
      border-radius: 12px !important;
      font-size: 20px !important;
    }

    .grid-2, .grid-3 { grid-template-columns: 1fr !important; }

    .section { padding: 16px !important; }
    .page-header { padding: 16px 16px 0 !important; }

    .page-title { font-size: 36px !important; }

    #active-workout-view .card { margin-left: 0 !important; margin-right: 0 !important; }

    .modal-overlay {
      padding: 12px !important;
      align-items: center !important;
    }

    /* Bottom sheets — coach, tecnica, rest ficam na base */
    #coach-modal,
    #tecnica-modal,
    #rest-modal {
      padding: 0 !important;
      align-items: flex-end !important;
    }
    #coach-modal > div,
    #tecnica-modal > div,
    #rest-modal > div {
      width: 100% !important;
      border-radius: 22px 22px 0 0 !important;
      max-height: 90vh !important;
      overflow-y: auto !important;
      padding-bottom: 32px !important;
    }

    .modal {
      width: 100% !important;
      max-width: 100% !important;
      max-height: 80vh !important;
      overflow-y: auto !important;
      border-radius: 16px !important;
      padding: 18px 14px 22px !important;
    }

    .grid-2 { grid-template-columns: 1fr 1fr !important; }
    .execution-btn { font-size: 11px !important; padding: 9px 4px !important; }
    .num-input-wrap input { font-size: 16px !important; }
    .num-btn { width: 38px !important; height: 42px !important; font-size: 17px !important; }
  }

  @keyframes pulse-orange {
    0%, 100% { box-shadow: 0 0 0 0 var(--orange-mid); }
    50% { box-shadow: 0 0 0 8px transparent; }
  }

  .pulse { animation: pulse-orange 2s infinite; }

  .num-input-wrap {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--card2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    overflow: hidden;
  }

  .num-input-wrap input {
    border: none;
    border-radius: 0;
    text-align: center;
    background: transparent;
  }

  .num-btn {
    width: 36px;
    height: 40px;
    background: var(--border);
    border: none;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .num-btn:hover { background: var(--border2); }

  .wb-step-indicator { display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0; }
  .wb-step-circle { width:28px; height:28px; border-radius:50%; background:var(--border2); color:var(--muted); font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; transition:all 0.3s; }
  .wb-step-indicator.active .wb-step-circle { background:var(--orange); color:white; }
  .wb-step-indicator.done .wb-step-circle { background:var(--green); color:var(--dark); }
  .wb-step-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; }
  .wb-step-indicator.active .wb-step-label { color:var(--orange); }
  .wb-step-indicator.done .wb-step-label { color:var(--green); }
  .wb-step-line { flex:1; height:2px; background:var(--border2); margin:0 8px; margin-bottom:14px; transition:background 0.3s; }
  .wb-step-line.done { background:var(--green); }
  .day-pill { background:var(--card2); border:1px solid var(--border2); border-radius:8px; color:var(--muted2); font-size:11px; font-weight:600; padding:8px 4px; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; text-align:center; }
  .day-pill:hover { border-color:var(--orange-mid); color:var(--text); }
  .day-pill.selected { background:var(--orange); border-color:var(--orange); color:white; }
  .wb-ex-row { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--card2); border:1px solid var(--border); border-radius:10px; cursor:pointer; transition:all 0.15s; user-select:none; }
  .wb-ex-row:hover { border-color:var(--orange-mid); }
  .wb-ex-row.selected { border-color:var(--orange); background:var(--orange-dim); }
  .wb-ex-check { width:20px; height:20px; border-radius:6px; border:2px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; transition:all 0.15s; }
  .wb-ex-row.selected .wb-ex-check { background:var(--orange); border-color:var(--orange); color:white; }

  @keyframes toastIn {
    from { opacity:0; transform:translateX(-50%) translateY(-12px); }
    to   { opacity:1; transform:translateX(-50%) translateY(0); }
  }

  /* ── SELETOR DE GRUPOS MUSCULARES ── */
  .muscle-group-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 8px;
  }
  .muscle-pill {
    padding: 10px 6px;
    background: #1A1A1A;
    border: 1.5px solid #333;
    border-radius: 12px;
    color: #888;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.3;
  }
  .muscle-pill.selected {
    background: rgba(255,92,0,0.12);
    border-color: var(--orange);
    color: var(--orange);
  }
  .muscle-pill .pill-emoji { display: block; font-size: 18px; margin-bottom: 3px; }

  /* ── ORDEM DOS EXERCÍCIOS ── */
  .wb-sortable-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
  }
  .wb-sort-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #1A1A1A;
    border: 1px solid #2A2A2A;
    border-radius: 12px;
    padding: 10px 12px;
    cursor: grab;
    user-select: none;
    transition: background 0.15s, border-color 0.15s;
  }
  .wb-sort-row.dragging {
    opacity: 0.5;
    border-color: var(--orange);
  }
  .wb-sort-row.drag-over {
    background: rgba(255,92,0,0.08);
    border-color: var(--orange);
  }
  .wb-sort-handle { color: #555; font-size: 16px; flex-shrink: 0; }
  .wb-sort-num {
    width: 22px; height: 22px;
    background: var(--orange);
    border-radius: 50%;
    color: white;
    font-size: 11px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .wb-sort-info { flex: 1; min-width: 0; }
  .wb-sort-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .wb-sort-group { font-size: 11px; color: var(--muted2); margin-top: 1px; }
  .wb-sort-remove {
    color: #555; font-size: 18px; cursor: pointer; padding: 4px;
    flex-shrink: 0; line-height: 1;
  }
  .wb-sort-remove:hover { color: var(--red); }

  .muscle-group-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,92,0,0.1);
    border: 1px solid rgba(255,92,0,0.3);
    color: var(--orange);
    margin-right: 4px;
    margin-bottom: 4px;
  }

  /* ── INICIAR SÉRIE ── */
  .serie-start-btn {
    width: 100%;
    padding: 16px;
    background: var(--orange);
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
    transition: transform 0.1s, background 0.1s;
  }
  .serie-start-btn:active { transform: scale(0.97); }
  .serie-start-btn.counting {
    background: #111;
    border: 2px solid var(--orange);
    color: var(--orange);
    pointer-events: none;
    font-size: 22px;
  }

  /* ── TIP TOAST ── */
  .tip-toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1E1E1E;
    border: 1px solid var(--orange-mid);
    border-radius: 14px;
    padding: 12px 16px;
    max-width: 340px;
    width: calc(100% - 40px);
    z-index: 500;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  .tip-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .tip-toast .tip-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .tip-toast .tip-text { font-size: 13px; color: var(--text); line-height: 1.5; flex: 1; }
  .tip-toast .tip-close {
    font-size: 16px; color: var(--muted2); cursor: pointer;
    pointer-events: all; padding: 0 4px; flex-shrink: 0;
  }

  /* ── CRONÔMETRO DE EXECUÇÃO ── */
  .exec-timer {
    background: var(--card);
    border: 2px solid var(--orange);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    text-align: center;
    display: none;
  }
  .exec-timer.active { display: block; }
  .exec-timer-label { font-size: 11px; color: var(--muted2); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .exec-timer-num { font-family: 'DM Mono', monospace; font-size: 52px; font-weight: 900; color: var(--orange); line-height: 1; }
  .exec-timer-num.ok     { color: #4CAF50; }
  .exec-timer-num.fast   { color: #FF5C00; }
  .exec-timer-sub { font-size: 12px; color: var(--muted2); margin-top: 6px; }
  .exec-timer-bar {
    height: 4px; border-radius: 4px; background: var(--border);
    margin-top: 10px; overflow: hidden;
  }
  .exec-timer-bar-fill {
    height: 100%; background: var(--orange);
    transition: width 1s linear; border-radius: 4px;
  }

  /* ── SUGESTÃO DE CARGA NA SÉRIE ── */
  .set-suggestion {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(76,175,80,0.12); border: 1px solid rgba(76,175,80,0.4);
    border-radius: 6px; padding: 2px 6px;
    font-size: 10px; font-weight: 700; color: #4CAF50;
    margin-left: 6px; vertical-align: middle;
  }

  /* ── VALIDADOR DE ESTÍMULO ── */
  .v-opt {
    padding: 10px 8px;
    background: #1A1A1A;
    border: 1px solid #333;
    border-radius: 10px;
    color: #888;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .v-opt.selected {
    background: rgba(255,92,0,0.12);
    border-color: #FF5C00;
    color: #FF5C00;
  }
  .v-rate {
    width: 32px;
    height: 32px;
    background: #1A1A1A;
    border: 1px solid #333;
    border-radius: 8px;
    color: #888;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
  }
  .v-rate.selected {
    background: #FF5C00;
    border-color: #FF5C00;
    color: white;
  }

  /* ── CADÊNCIA / METRÔNOMO CSS ── */
  .cadencia-widget {
    background: var(--card2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 12px;
    transition: all 0.3s;
  }
  .cadencia-widget.ativa {
    border-color: var(--orange);
    background: var(--orange-dim);
  }
  .cadencia-fase {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
    margin: 10px 0;
  }
  .cadencia-bloco {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    flex: 1;
    padding: 8px 4px;
    border-radius: 10px;
    background: var(--card);
    border: 2px solid transparent;
    transition: all 0.3s;
  }
  .cadencia-bloco.atual {
    border-color: var(--orange);
    background: rgba(255,92,0,0.15);
    transform: scale(1.05);
  }
  .cadencia-bloco.completo {
    border-color: var(--green);
    background: rgba(76,175,80,0.1);
  }
  .cadencia-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--orange);
    line-height: 1;
    transition: color 0.2s;
  }
  .cadencia-bloco.atual .cadencia-num { color: var(--orange); }
  .cadencia-bloco.completo .cadencia-num { color: var(--green); }
  .cadencia-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted2);
  }
  .cadencia-sep {
    font-size: 16px;
    color: var(--border2);
    font-weight: 300;
  }
  .cadencia-counter {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--orange);
    line-height: 1;
    text-align: center;
    transition: color 0.2s;
  }
  .cadencia-counter.pausa { color: var(--yellow); }
  .cadencia-counter.sobe { color: var(--green); }
  .cadencia-fase-label {
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    color: var(--muted2);
    margin-bottom: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .cadencia-preset-row {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .cadencia-preset {
    flex: 1;
    padding: 6px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--card);
    font-size: 11px;
    font-weight: 700;
    color: var(--muted2);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .cadencia-preset.ativo { background: var(--orange); border-color: var(--orange); color: white; }

  /* ── RETENTION / GAMIFICATION CSS ── */

  /* Streak */
  .streak-fire {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #1a0800, #0a0a0a);
    border: 1px solid rgba(255,92,0,0.3);
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .streak-fire::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--orange), #ff9800, var(--orange));
    background-size: 200% 100%;
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .streak-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--orange);
    line-height: 1;
  }
  .streak-label { font-size: 12px; color: var(--muted2); }
  .streak-days {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  .streak-day {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
  }
  .streak-day.done { background: var(--orange); color: white; }
  .streak-day.today { background: rgba(255,92,0,0.2); border: 1px solid var(--orange); color: var(--orange); }
  .streak-day.miss { background: var(--card2); color: var(--muted2); }

  /* Badges */
  .badge-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 12px;
  }
  .badge-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 6px;
    background: var(--card2);
    border-radius: 12px;
    border: 1px solid var(--border);
    transition: all 0.2s;
  }
  .badge-item.unlocked {
    background: var(--orange-dim);
    border-color: rgba(255,92,0,0.3);
  }
  .badge-item.locked { opacity: 0.35; filter: grayscale(1); }
  .badge-emoji { font-size: 26px; }
  .badge-name { font-size: 9px; font-weight: 700; text-align: center; color: var(--muted2); line-height: 1.2; }
  .badge-item.unlocked .badge-name { color: var(--orange); }

  /* XP Bar */
  .xp-bar-wrap {
    background: var(--card2);
    border-radius: 20px;
    height: 8px;
    overflow: hidden;
    margin: 6px 0;
  }
  .xp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), #ff9800);
    border-radius: 20px;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
  }

  /* 30-day progress */
  .progress-30 {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 3px;
    margin-top: 10px;
  }
  .day-dot {
    aspect-ratio: 1;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700;
  }
  .day-dot.done { background: var(--orange); }
  .day-dot.today { background: rgba(255,92,0,0.3); border: 1px solid var(--orange); }
  .day-dot.future { background: var(--card2); }
  .day-dot.milestone { outline: 2px solid #ff9800; outline-offset: 1px; }

  /* Confetti */
  .confetti-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Check-in modal */
  .checkin-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 400;
    display: none;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .checkin-overlay.open {
    display: flex;
    opacity: 1;
    pointer-events: all;
  }
  .checkin-sheet {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    border-top: 1px solid var(--border);
  }
  .checkin-overlay.open .checkin-sheet { transform: translateY(0); }
  .checkin-emoji-row {
    display: flex;
    justify-content: space-around;
    margin: 20px 0;
  }
  .checkin-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 16px 12px;
    border-radius: 16px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 80px;
  }
  .checkin-option:active { transform: scale(0.95); }
  .checkin-option.selected { border-color: var(--orange); background: var(--orange-dim); }
  .checkin-option-emoji { font-size: 36px; }
  .checkin-option-label { font-size: 12px; font-weight: 600; color: var(--muted2); }

  /* Return message */
  .return-card {
    background: linear-gradient(135deg, #0a1a0a, #0a0a0a);
    border: 1px solid rgba(76,175,80,0.3);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    text-align: center;
  }

  /* PLANTA DO PROGRESSO */
  .plant-container {
    background: linear-gradient(135deg, #0a1a0a, #0f1f0f);
    border: 1px solid #00E676;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .plant-emoji {
    font-size: 68px;
    transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    filter: drop-shadow(0 0 15px #00E676);
  }
  .plant-dead { 
    font-size: 68px; 
    filter: grayscale(1) brightness(0.6); 
    transform: rotate(-12deg) scale(0.85);
  }
  .plant-label {
    font-size: 13px;
    color: #00E676;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .plant-status {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
  }

  /* ── BIBLIOTECA / DB CSS ── */
  .musculo-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .musculo-card:hover { border-color: var(--orange-mid); background: var(--orange-dim); }

  .ex-db-card {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ex-db-card:hover { border-color: var(--orange-mid); transform: translateX(3px); }
  .ex-db-card.expanded { border-color: var(--orange); }

  .ex-ficha {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s ease;
  }
  .ex-ficha.open { max-height: 600px; }

  .overlap-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,200,0,0.1);
    color: var(--yellow);
    border-radius: 6px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 700;
  }

  .filter-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 16px;
    scrollbar-width: none;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tab {
    flex-shrink: 0;
    background: var(--card2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-tab.active { background: var(--orange); border-color: var(--orange); color: white; }

  .reader-header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .reader-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; flex: 1; }
  .reader-content { flex: 1; overflow-y: auto; padding: 24px 20px; max-width: 680px; margin: 0 auto; width: 100%; }

  .reader-chapter {
    margin-bottom: 32px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  .reader-chapter:last-child { border-bottom: none; }

  .reader-ch-tag { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); margin-bottom: 6px; }
  .reader-ch-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; margin-bottom: 14px; }
  .reader-ch-body { font-size: 14px; line-height: 1.8; color: var(--muted2); }
  .reader-ch-body p { margin-bottom: 12px; }
  .reader-ch-body strong { color: var(--text); }
  .reader-ch-body ul { padding-left: 18px; margin-bottom: 12px; }
  .reader-ch-body li { margin-bottom: 6px; }

  .reader-paywall {
    background: linear-gradient(to bottom, transparent, var(--darker) 40%);
    position: sticky;
    bottom: 0;
    padding: 60px 20px 24px;
    text-align: center;
    margin-top: -80px;
  }
  .reader-paywall-card {
    background: var(--card);
    border: 1px solid var(--orange-mid);
    border-radius: 16px;
    padding: 24px 20px;
    max-width: 400px;
    margin: 0 auto;
  }

  /* ── LEVEL BUTTONS (onboarding) ── */
  .level-btn {
    display: flex; align-items: center; gap: 14px; padding: 16px;
    background: var(--card2); border: 2px solid var(--border2);
    border-radius: 14px; cursor: pointer; transition: all 0.2s;
    width: 100%; text-align: left; font-family: 'DM Sans', sans-serif; color: var(--text);
  }
  .level-btn:hover { border-color: var(--orange-mid); background: var(--orange-dim); }
  .level-btn.selected { border-color: var(--orange); background: var(--orange-dim); }
  .level-btn .level-title { font-weight: 700; font-size: 15px; }
  .level-btn .level-desc  { font-size: 12px; color: var(--muted2); margin-top: 2px; }

  .type-btn {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 14px 8px; background: var(--card2); border: 2px solid var(--border2);
    border-radius: 12px; cursor: pointer; transition: all 0.2s;
    font-family: 'DM Sans', sans-serif; color: var(--muted2); font-size: 13px; font-weight: 600;
  }
  .type-btn:hover { border-color: var(--orange-mid); }
  .type-btn.active { border-color: var(--orange); background: var(--orange-dim); color: var(--orange); }

  .cardio-fields {
    background: var(--card2); border-radius: 12px; padding: 14px;
    margin-top: 8px; border: 1px solid var(--border); animation: fadeIn 0.2s ease;
  }

  .effort-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 14px 8px;
    background: var(--card2);
    border: 1.5px solid var(--border2);
    border-radius: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted2);
    transition: all 0.2s;
    width: 100%;
  }
  .effort-btn:hover { border-color: var(--orange-mid); color: var(--text); }
  .effort-btn.selected-facil  { background: var(--green-dim);  border-color: var(--green);  color: var(--green); }
  .effort-btn.selected-certo  { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }
  .effort-btn.selected-pesado { background: rgba(255,82,82,0.12); border-color: var(--red); color: var(--red); }

  .execution-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 12px 8px;
    background: var(--card2);
    border: 1.5px solid var(--border2);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted2);
    width: 100%;
  }
  .execution-btn:hover { border-color: var(--orange-mid); color: var(--text); }
  .execution-btn.active {
    background: var(--orange-dim);
    border-color: var(--orange);
    color: var(--orange);
  }
  .execution-btn.active span:last-child { color: var(--orange) !important; opacity: 0.8; }

  .rest-preset-btn {
    background: var(--card2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--muted2);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 12px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }
  .rest-preset-btn:hover { border-color: var(--orange-mid); color: var(--text); }
  .rest-preset-btn.active { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }

  #pre-workout-modal {
    align-items: flex-end;
    padding-bottom: 0;

  }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar (mobile vira bottom nav) -->
  <div class="sidebar">
    <div class="logo">PROGRESSAR</div>
    <button class="nav-btn active" data-view="dashboard"><span>🏠</span><span class="tooltip">Dashboard</span></button>
    <button class="nav-btn" data-view="plans"><span>📋</span><span class="tooltip">Planos</span></button>
    <button class="nav-btn" data-view="history"><span>📈</span><span class="tooltip">Histórico</span></button>
    <button class="nav-btn" data-view="medidas"><span>📏</span><span class="tooltip">Medidas</span></button>
    <button class="nav-btn" data-view="library"><span>📚</span><span class="tooltip">Biblioteca</span></button>
  </div>

  <div class="main">

    <!-- Dashboard (principal) -->

      <div class="page-header">
        <div>
          <div class="page-title">DASHBOARD</div>
          <div class="page-subtitle">Progresso • Treinos • Motivação</div>
        </div>
      </div>

      <div class="section">
        <!-- Streak + XP -->
        <div id="streak-card"></div>

        <!-- Novas features de retenção -->
        <div id="retention-widgets">
          <!-- PLANTA DO PROGRESSO -->
          <div class="plant-container" id="plant-card">
            <div style="display:flex; align-items:center; gap:16px;">
              <div id="plant-emoji" class="plant-emoji">🌱</div>
              <div style="flex:1">
                <div class="plant-label">PLANTA DO PROGRESSO</div>
                <div id="plant-name" style="font-size:15px; font-weight:700; color:#fff;">Seu Musgo do Ganho</div>
                <div id="plant-status" class="plant-status">Nível 1 • 0 dias de vida</div>
              </div>
              <div id="plant-streak" style="text-align:right; font-family:'Bebas Neue'; font-size:32px; color:#00E676; line-height:1;">0</div>
            </div>
          </div>

          <!-- APOSTA FINANCEIRA -->
          <div class="card" id="aposta-card" style="background:linear-gradient(135deg,#1a0800,#0a0a0a); border:1px solid #FF5252; margin-bottom:16px; display:none;">
            <div style="display:flex; align-items:center; gap:12px;">
              <span style="font-size:32px;">💰</span>
              <div>
                <div style="font-weight:700; color:#FF5252;">APOSTA ATIVA</div>
                <div style="font-size:13px; color:#888;">R$ 50 • Se quebrar streak perde tudo</div>
              </div>
            </div>
            <div id="aposta-status" style="margin-top:12px; font-size:13px; color:#aaa;"></div>
          </div>

          <button onclick="ativarAposta()" class="btn btn-primary btn-full" id="ativar-aposta-btn" style="margin-bottom:16px; background:#FF5252;">
            ATIVAR APOSTA R$ 50 (vai pra caridade se falhar)
          </button>
        </div>

        <!-- Restante do dashboard (treino atual, próximos, etc.) -->
        <div class="card">
          <div style="font-weight:700; margin-bottom:12px;">Treino de Hoje</div>
          <!-- Aqui viria o conteúdo do treino ativo, cards de exercícios, etc. -->
          <p style="color:var(--muted2);">Nenhum treino planejado para hoje. Escolha um plano!</p>

    <!-- ... (mantenha o conteúdo original das outras seções) ... -->

<script>
// ───────────────────────────────────────────────
//  STATE & SAVE (mantenha sua lógica original)
// ───────────────────────────────────────────────
let state = {
  user: null,
  workoutPlans: [],
  sessions: [],
  records: {},
  medidas: [],
  gamification: {},
  aposta: null,
  // ... outros campos do seu state original
};

function saveState() {
  localStorage.setItem('progressar_state', JSON.stringify(state));
  renderPlant();
  updateApostaUI();
}

function load() {
  const saved = localStorage.getItem('progressar_state');
  if (saved) state = JSON.parse(saved);
}

// ───────────────────────────────────────────────
//  STATS (mantenha sua função original)
// ───────────────────────────────────────────────
function getStats() {
  // Sua implementação original aqui...
  // Retorne no mínimo: { streakAtual, totalSessions, ... }
  return {
    streakAtual: 0, // substitua pela lógica real
    totalSessions: 0,
    // ...
  };
}

// ───────────────────────────────────────────────
//  PLANTA DO PROGRESSO
// ───────────────────────────────────────────────
function renderPlant() {
  const stats = getStats();
  const emojiEl = document.getElementById('plant-emoji');
  const nameEl = document.getElementById('plant-name');
  const statusEl = document.getElementById('plant-status');
  const streakEl = document.getElementById('plant-streak');

  if (!emojiEl) return;

  const days = stats.streakAtual || 0;
  const level = Math.min(8, Math.floor(days / 7) + 1);

  const plants = ['🌱','🌿','🌳','🌴','🌵','🪴','🌲','🌳'];
  const names  = ['Musgo do Ganho','Broto Forte','Árvore do Shape','Palmeira do PR','Cacto Invencível','Bambu do Muzy','Carvalho Lendário','Baobá do Progresso'];

  emojiEl.textContent = plants[level-1];
  nameEl.textContent = names[level-1];
  statusEl.textContent = `Nível ${level} • ${days} dias de vida`;
  streakEl.textContent = days;

  if (days === 0) {
    emojiEl.textContent = '🥀';
    emojiEl.classList.add('plant-dead');
    nameEl.textContent = 'Sua planta morreu...';
    statusEl.innerHTML = `<span style="color:#FF5252">Quebrou a streak. Ela morreu.</span>`;
  } else {
    emojiEl.classList.remove('plant-dead');
  }
}

// ───────────────────────────────────────────────
//  APOSTA FINANCEIRA (simulação)
// ───────────────────────────────────────────────
function ativarAposta() {
  if (confirm('Você vai apostar R$ 50. Se quebrar a streak o dinheiro vai para a APAE. Tem certeza?')) {
    state.aposta = {
      ativa: true,
      valor: 50,
      dataInicio: Date.now(),
      streakNoInicio: getStats().streakAtual
    };
    saveState();
    showNotif('🔥', 'Aposta ativada!', 'Agora tem consequência REAL. Não vai desistir.', 'success');
  }
}

function updateApostaUI() {
  const card = document.getElementById('aposta-card');
  const btn = document.getElementById('ativar-aposta-btn');
  const status = document.getElementById('aposta-status');

  if (!state.aposta || !state.aposta.ativa) {
    if (card) card.style.display = 'none';
    if (btn) btn.style.display = 'block';
    return;
  }

  if (card) card.style.display = 'block';
  if (btn) btn.style.display = 'none';

  const dias = Math.floor((Date.now() - state.aposta.dataInicio) / 86400000);
  if (status) {
    status.textContent = `Ativa há ${dias} dias • R$ ${state.aposta.valor} em jogo`;
  }

  // Se streak zerou depois de ativar → "perdeu"
  if (getStats().streakAtual === 0 && dias > 0) {
    status.innerHTML = `<span style="color:#FF5252">Você perdeu a aposta! R$ ${state.aposta.valor} doados.</span>`;
    state.aposta.ativa = false; // desativa para não ficar aparecendo sempre
    saveState();
  }
}

// ───────────────────────────────────────────────
//  INIT & UPDATES
// ───────────────────────────────────────────────
function initApp() {
  load();
  renderPlant();
  updateApostaUI();
  // ... chame suas outras funções de render (streak, dashboard, etc.)
}

window.addEventListener('load', () => {
  initApp();
});

// Função de notificação (se não tiver, adicione uma simples)
function showNotif(emoji, title, msg, type = 'success') {
  alert(`${emoji} ${title}\n${msg}`);
  // Substitua por sua implementação real de notification
}
</script>
