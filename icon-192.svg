<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="38" fill="#0A0A0A"/>
  <rect width="192" height="192" rx="38" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Barra de progresso decorativa -->
  <rect x="24" y="130" width="144" height="8" rx="4" fill="#1E1E1E"/>
  <rect x="24" y="130" width="100" height="8" rx="4" fill="#FF5C00"/>
  <!-- Letra P grande -->
  <text x="96" y="118" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="110" fill="#FF5C00" text-anchor="middle">P</text>
  <!-- Seta de progressão -->
  <polygon points="148,52 162,38 162,66" fill="#FF5C00" opacity="0.7"/>
</svg>
